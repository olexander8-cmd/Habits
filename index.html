function gSaveNow(){
  if(!_gF)return Promise.resolve();
  return _ensureToken().then(function(ok){
    if(!ok){gSetStatus('error');return;}
    gSetStatus('syncing');
    // Pull latest from cloud first, merge, then push
    return gLoadFile().then(function(cloud){
      if(cloud){
        var merged=mergeData(ST,cloud);
        if(applyMerged(merged))render();
      }
      var data={startDate:ST.startDate,dailyData:ST.daily,weeklyData:ST.weekly,descs:ST.descs||{},_descsTs:ST._descsTs||0,habitDefs:ST.habitDefs||[],_habitDefsTs:ST._habitDefsTs||0,_habitDefsMigrated:ST._habitDefsMigrated||false,labels:ST.labels||{},_labelsTs:ST._labelsTs||0,candidates:ST.candidates||[],_candidatesTs:ST._candidatesTs||0,sprints:ST.sprints||[],_sprintsTs:ST._sprintsTs||0,threads:ST.threads||[],_threadsTs:ST._threadsTs||0,keepers:ST.keepers||[],_keepersTs:ST._keepersTs||0,principles:ST.principles||[],_principlesTs:ST._principlesTs||0,north:ST.north||'',_northTs:ST._northTs||0,hideHabits:!!ST.hideHabits,_hideHabitsTs:ST._hideHabitsTs||0,_ts:Date.now()};

        if(r.ok){gSetStatus('synced');}
        else if(r.status===401){return gRefresh().then(function(ok){if(ok)return gSaveNow();gSetStatus('error');});}
        else{gSetStatus('error');}
      });
    }).catch(function(e){console.error(e);gSetStatus('error');});
  });
}

function gLoadFile(){
  if(!_gF)return Promise.resolve(null);
  return _ensureToken().then(function(ok){
    if(!ok)return null;
    return fetch('https://www.googleapis.com/drive/v3/files/'+_gF+'?alt=media',{headers:{Authorization:'Bearer '+_gT}}).then(function(r){if(!r.ok)return null;return r.json();}).catch(function(){return null;});
  });
}

function gQueueSync(){
  if(!gSignedIn())return;
  clearTimeout(_gST);
  gSetStatus('syncing');
  _gST=setTimeout(gSaveNow,1500);

function renderFaq(){var b=document.getElementById('faqBody');var h='';
 h+='<div class="faq-sec"><div class="faq-h">С чего начать</div><p>Метафора — сад: что полезно, растишь (посадки, опоры); вредные тяги выпалываешь (сорняки). Ежедневная работа идёт в <b>Логе импульсов</b>.</p><p><b>Петля одного импульса:</b></p><p>1. Заметил желание — занеси в лог («захотелось залипнуть в ленту»).<br>2. Оцени <b>«тянет»</b> 0–10 — насколько тянет <i>прямо сейчас</i> (напр. 8).<br>3. Позже оцени <b>«последствия»</b> 0–10 — как оказалось <i>по факту</i> (через час: пусто, время ушло — 2).<br>4. Повесь тег.</p><p><b>Зачем две оценки в разное время.</b> «Тянет» — обещание в моменте, «последствия» — правда потом. Разрыв между ними (8→2) и слабит привычку: мозг видит, что тяга обманула. Поэтому «последствия» ставь честно и позже, не в ту же секунду.</p><p><b>Вердикт по «последствиям»:</b> <b style="color:#22c55e">≥6 — посадка +</b> (стоило, питай это); <b style="color:#ef4444">≤3 — сорняк 0/–</b> (тяга обманула); между — нейтрально.</p><p>Дальше тег решает, куда уйдёт импульс — см. «Три тега и их выход» ниже.</p></div>';
 h+='<div class="faq-sec"><div class="faq-h">Карта разделов</div><p><b>📝 Лог импульсов</b> (в «Дне») — главный экран: заносишь желания, оцениваешь, помечаешь.</p><p><b>🌊 Переждал</b> — счётчик «не покормил тягу». Жмёшь, когда потянуло и ты пережил, не поддавшись (захотелось сладкого → выпил воды → +1).</p><p><b>🥀 Потенциальные сорняки</b> — куда уходит тег «сорняк». Проверяешь тестами, что правда пусто, ставишь статус, и <b>переоцениваешь повторно</b> (новый случай) — со временем виден разрыв по ряду. Повторяется с триггером → «→ правило».</p><p><b>⚓ Опоры</b> — нужное, подтверждённое ценным (тег «растим дальше» или прямой путь из маршрута). Можно «вести по дням» — отмечать получилось/нет (напр. «утренняя прогулка»).</p><p><b>📜 Принципы (если→то)</b> — заранее заготовленный ответ на повторяющийся сорняк: «если открываю телефон в кровати → телефон на кухню». Создаётся из сорняка кнопкой «→ правило».</p><p><b>🧩 Откуда растёт</b> — для копания в подавленное и неясное. Когда задело сильнее повода, зависть, «не моё» — пишешь сигнал и гипотезу, ищешь настоящую нужду.</p><p><b>📆 Квартальные спринты</b> — фокус на одном домене (кофе / шопинг / избегание) на ~3 месяца, с выводом в конце.</p><p><b>🔍 Обзор что растёт</b> — еженедельная сверка: неделя к неделе (меньше сорняков? больше опор?), что недооценено, что в работе.</p><p><b>🧭 Ради чего всё</b> (вверху «Дня») — 3–5 ценностей или миссия, по которой судишь «полезно или сорняк». Компас всего.</p><p><b>Статус «в депривации»</b> (у сорняка) — «на паузе»: временно не даёшь себе это, чтобы проверить, насколько реально нужно.</p></div>';
 h+='<div class="faq-sec"><div class="faq-h">Сорняк или кривой маршрут — в чём разница</div><p>Сорняк — тяга, за которой пусто: последствия 0/–. Её обесценивают и пережидают. Кривой маршрут — другое: <b>цель настоящая, а дорога к ней кривая.</b> Покупка вещи (кривой путь) ради статуса или принятия (настоящая нужда). Тягу нельзя просто выполоть — задавишь и саму нужду.</p></div>';
 h+='<div class="faq-sec"><div class="faq-h">🥀 Что делать с сорняком</div><p>Обесценить, выполоть, переждать. Не кормить тягу, дожить её — счётчик «переждал». Если всплывает с понятным триггером — поднять в правило «если→то» (кнопка «→ правило»). Если триггера нет (скука, диффузная тяга) — правило не сработает: пережди, поставь на депривацию или копай в «откуда растёт».</p></div>';
 h+='<div class="faq-sec"><div class="faq-h">🔀 Что делать с кривым маршрутом</div><p><b>Не убрать, а перенаправить.</b></p><p><b>1. Докопаться до настоящей цели</b> — лестницей «зачем→зачем». Внизу почти всегда живая нужда: близость, признание, безопасность, смысл. У сорняка дно — пустота, у маршрута дно — настоящая потребность.</p><p><b>2. Назвать прямой путь к той же цели.</b> Кривой: «купить, чтобы почувствовать, что чего-то стою». Прямой: «сделать работу, которой горжусь» / «позвонить тому, кто важен». Прямой путь дороже усилием и медленнее наградой — потому и проигрывает быстрому суррогату.</p><p><b>3. Перевести прямой путь в опору.</b> Найденный прямой маршрут — уже не лишнее, а нужное. Кнопка «→ прямой путь»: называешь настоящую цель и прямой путь, он становится опорой (можно вести по дням). Маршрут не удаляется в никуда — конвертируется в опору.</p></div>';
 h+='<div class="faq-sec"><div class="faq-h">🧭 Истинные нужды — к чему копать</div><p>Настоящую нужду не вспоминают, её вычисляют. Если опыта нет или нужда задавлена — прямого доступа нет, её выводят с нескольких сторон (см. пробы ниже). Главное различение: <b>нужда универсальна и ни к чему конкретному не привязана; стратегия — конкретный способ её закрыть.</b> «Купить эту вещь», «чтобы он меня похвалил» — стратегии. «Чувствовать, что я значим» — нужда. Если желаемое можешь назвать только через предмет или человека — копай ещё.</p><p><b>Связь:</b> близость (быть рядом, не один), признание (быть увиденным как личность), принятие (берут как есть). <i>Маски: переедание, залипание, понты, спор ради правоты.</i></p><p><b>Безопасность:</b> безопасность тела и чувств (предсказуемость, можно расслабиться), опора/стабильность (надёжная почва). <i>Маски: контроль, накопительство, тревожная занятость, перфекционизм.</i></p><p><b>Я / агентность:</b> автономия (сам выбираю путь), компетентность/мастерство (расти в деле), достоинство/самоценность (стою сам по себе). <i>Маски: бунт назло, страх провала, погоня за статусом, трудоголизм.</i></p><p><b>Смысл:</b> смысл/вклад (мои усилия чему-то служат), рост/становление (развиваться). <i>Маски: бесконечное потребление инфо, спасательство.</i></p><p><b>Витальность:</b> отдых/восстановление, игра/радость, новизна/стимуляция, свобода/пространство, телесное (сон, еда, движение, прикосновение). <i>Маски: «отдых» через ленту и еду, импульсивные покупки, переключение вкладок.</i></p></div>';
 h+='<div class="faq-sec"><div class="faq-h">Как докопаться, когда не знаешь</div><p>Две-три пробы сходятся → нашёл.</p><p><b>1. Что почувствую, если получу?</b> Представь, что цель уже твоя. Облегчение → безопасность. Тепло → близость. «Наконец я ок» → самоценность.</p><p><b>2. Чего боюсь, если НЕ получу?</b> Страх отвечает прямее желания. Остаться один → близость. Оказаться никчёмным → самоценность. Потерять контроль → безопасность/автономия. <i>Бояться проигрыша вместо гордиться победой — внизу не мастерство, а безопасность.</i></p><p><b>3. Тело.</b> Сжатие/защита → угроза/безопасность; пустота в груди → связь или смысл; непоседливость → новизна или свобода; тяжесть → отдых.</p><p><b>4. Проба насыщением.</b> Это «последствия» в логе. Повторяешь стратегию, а последствия раз за разом 0/– — бьёшь не в ту нужду. Низкий разрыв по ряду случаев = мимо.</p><p><b>5. Чей это голос?</b> «Если бы никто не узнал — я бы всё ещё этого хотел?» Гаснет без зрителя → выученная цель-перформанс, не нужда.</p></div>';
 h+='<div class="faq-sec"><div class="faq-h">Задавленные нужды · зависть-компас</div><p>К некоторым нуждам нет прямого доступа — их в детстве стыдили, и они ушли в тень. Признаки: презрение к этой нужде в других («нуждаться = слабость» часто = своя задавленная близость), и <b>зависть/раздражение</b>, когда кто-то свободно ею пользуется. Зависть — компас: показывает нужду, от которой ты отрёкся. Это сигналы раздела «Откуда растёт» (зависть, задело сильнее повода) — вход к подавленному.</p></div>';
 h+='<div class="faq-sec"><div class="faq-h">Три тега и их выход</div><p><b style="color:#ef4444">сорняк</b> (пусто) → реестр → обесценить / переждать; при чётком триггере → правило.</p><p><b style="color:#f59e0b">кривой маршрут</b> (цель есть, путь кривой) → лестница до нужды → прямой путь → в опоры.</p><p><b style="color:#22c55e">растим дальше</b> (своё) → сразу в опоры.</p></div>';

 h+='<div class="rev-item">\u041f\u043e\u0434\u043a\u0440\u0435\u043f\u043b\u0435\u043d\u0438\u0439 \u043e\u043f\u043e\u0440: <span class="rev-num">'+cur.reps+'</span>'+dlt(cur.reps,prev.reps,'up')+'</div>';
 h+='<div class="rev-item" style="color:rgba(255,255,255,.3);font-size:11px">\u0417\u0435\u043b\u0451\u043d\u044b\u0439 = \u0434\u0432\u0438\u0436\u0435\u043d\u0438\u0435 \u0432 \u043d\u0443\u0436\u043d\u0443\u044e \u0441\u0442\u043e\u0440\u043e\u043d\u0443. \u0421\u043a\u043e\u0431\u043a\u0430 = \u043f\u0440\u043e\u0448\u043b\u0430\u044f \u043d\u0435\u0434\u0435\u043b\u044f.</div></div>';
 if(unrated.length){h+='<div class="rev-block"><div class="rev-h">\u2192 Достань «последствия» ('+unrated.length+')</div>';unrated.forEach(function(x){h+='<div class="rev-item">'+esc(x.text||'')+' \u00b7 '+fmtSh(x.date)+'</div>';});h+='<div class="rev-item" style="color:rgba(255,255,255,.35)">Оцени их в логе (блок «ждут оценки»).</div></div>';}
 h+='<div class="rev-block"><div class="rev-h">Потенциальные сорняки в работе ('+openCand.length+')</div>';if(!openCand.length)h+='<div class="rev-item" style="color:rgba(255,255,255,.35)">Нет активных.</div>';else openCand.forEach(function(c){h+='<div class="rev-item">'+esc(c.name||'без имени')+' \u00b7 '+(c.status==='depriv'?'в депривации':'присматриваю')+'</div>';});h+='</div>';
 if(ST.keepers.length){h+='<div class="rev-block"><div class="rev-h">\u041e\u043f\u043e\u0440\u044b \u00b7 \u043f\u043e\u0432\u0442\u043e\u0440\u044b \u0437\u0430 7 \u0434\u043d\u0435\u0439</div>';ST.keepers.forEach(function(k){var wc=keeWeekCount(k.id);h+='<div class="rev-item">'+esc(k.name||'\u043e\u043f\u043e\u0440\u0430')+': <span class="rev-num">'+wc+'</span>'+(wc===0?' <span style="color:#ef4444">\u2014 \u043d\u0435 \u043f\u043e\u0434\u043a\u0440\u0435\u043f\u043b\u044f\u043b\u0430\u0441\u044c</span>':'')+'</div>';});h+='</div>';}
 h+='<div class="rev-block"><div class="rev-h">Откуда растёт · открытые ('+openThr.length+')</div>';if(!openThr.length)h+='<div class="rev-item" style="color:rgba(255,255,255,.35)">Нет.</div>';else openThr.forEach(function(x){h+='<div class="rev-item">'+esc(x.title||'без названия')+'</div>';});h+='</div>';
 h+='<div class="rev-item" style="color:rgba(255,255,255,.3);font-size:11px;margin-top:14px;line-height:1.6">Раз в сезон спроси отдельно: работает ли сама система? что в ней лишнее или тяжёлое — упрости. И где реакция была больше повода — туда в «откуда растёт».</div>';

// — обработчики системы (отдельный делегат) —
document.addEventListener('click',function(e){var b=e.target.closest('[data-a]');if(!b)return;var a=b.dataset.a,d=b.dataset.d,i=b.dataset.i,v=b.dataset.v;
 if(a==='imp-want'){setImp(d,i,{want:parseInt(v)});render();}
 else if(a==='imp-like'){setImp(d,i,{like:parseInt(v),likedAt:Date.now()});render();}
 else if(a==='imp-tag'){var imp=findImp(d,i);setImp(d,i,{tag:imp&&imp.tag===v?'':v});render();}
 else if(a==='imp-promote'){promoteCand(d,i);}
 else if(a==='imp-del'){if(confirm('\u0423\u0434\u0430\u043b\u0438\u0442\u044c \u0438\u043c\u043f\u0443\u043b\u044c\u0441?')){delImp(d,i);render();}}
 else if(a==='cand-add'){addCandidate();}
 else if(a==='cand-test'){toggleTest(i,v);}
 else if(a==='cand-status'){setCandStatus(i,v);}
 else if(a==='cand-del'){if(confirm('\u0423\u0434\u0430\u043b\u0438\u0442\u044c \u043a\u0430\u043d\u0434\u0438\u0434\u0430\u0442\u0430?'))delCandidate(i);}
 else if(a==='thr-add'){addThread();}
 else if(a==='thr-signal'){setThreadField(i,'signal',v);}
 else if(a==='thr-type'){setThreadField(i,'type',v);}
 else if(a==='thr-close'){toggleThread(i);}
 else if(a==='thr-del'){if(confirm('\u0423\u0434\u0430\u043b\u0438\u0442\u044c \u043d\u0438\u0442\u044c?'))delThread(i);}
 else if(a==='spr-add'){addSprint();}
 else if(a==='spr-status'){toggleSprint(i);}
 else if(a==='spr-del'){if(confirm('\u0423\u0434\u0430\u043b\u0438\u0442\u044c \u0441\u043f\u0440\u0438\u043d\u0442?'))delSprint(i);}
 else if(a==='imp-keep'){promoteKeeper(d,i);}
 else if(a==='cand-case'){var cw=document.getElementById('cw-'+i),co=document.getElementById('co-'+i);var wv=cw?parseInt(cw.value,10):NaN,ov=co?parseInt(co.value,10):NaN;if(isNaN(wv)||isNaN(ov)||wv<0||wv>10||ov<0||ov>10)return;addCase(i,wv,ov);renderReg();}
 else if(a==='cand-cases-all'){_casesOpen[i]=!_casesOpen[i];renderReg();}
 else if(a==='rep-pick'){_repCand=i;render();}
 else if(a==='rep-save'){var rw=document.getElementById('repw'),ro=document.getElementById('repo');var wv=rw?parseInt(rw.value,10):NaN,ov=ro?parseInt(ro.value,10):NaN;if(isNaN(wv)||isNaN(ov)||wv<0||wv>10||ov<0||ov>10)return;addCase(_repCand,wv,ov);_repCand=null;render();}
 else if(a==='rep-cancel'){_repCand=null;render();}
 else if(a==='kee-add'){addKeeper();}
 else if(a==='kee-rep'){tapKeeper(i);if(document.getElementById('keePage')&&!document.getElementById('keePage').classList.contains('h'))renderKee();}
 else if(a==='kee-oc'){setKeeOutcome(i,v);}
 else if(a==='kee-track'){toggleKeeTrack(i);}
 else if(a==='kee-del'){if(confirm('\u0423\u0434\u0430\u043b\u0438\u0442\u044c \u043e\u043f\u043e\u0440\u0443?'))delKeeper(i);}
 else if(a==='cand-prin'){promotePrincipleFromCand(i);}
 else if(a==='cand-gorule'){var _c=findCand(i);if(_c&&_c.ruleId){openSys('prinPage');flashEl('prin-'+_c.ruleId);}}
 else if(a==='prin-gocand'){var _p=findPrin(i);if(_p&&_p.fromCandId){openSys('regPage');flashEl('creg-'+_p.fromCandId);}}
 else if(a==='imp-route'){promoteRoute(d,i);}
 else if(a==='imp-goroute'){if(findKee(i)){openSys('keePage');flashEl('kee-'+i);}}
 else if(a==='imp-gocand'){if(findCand(i)){openSys('regPage');flashEl('creg-'+i);}}
 else if(a==='imp-gokeep'){if(findKee(i)){openSys('keePage');flashEl('kee-'+i);}}
 else if(a==='prin-add'){addPrinciple();}
 else if(a==='prin-del'){if(confirm('\u0423\u0434\u0430\u043b\u0438\u0442\u044c \u043f\u0440\u0430\u0432\u0438\u043b\u043e?'))delPrinciple(i);}
});
function setLabel(k,v){if(!ST.labels)ST.labels={};if(v&&v.trim()!=='')ST.labels[k]=v;else delete ST.labels[k];ST._labelsTs=Date.now();save();}
document.addEventListener('input',function(e){var t=e.target,ds=t.dataset;if(t.classList&&t.classList.contains('case-in')){var cv=t.value.replace(/[^0-9]/g,'');if(cv!==''){var cn=parseInt(cv,10);if(cn>10)cn=10;cv=''+cn;}t.value=cv;return;}if(!ds)return;
 if(ds.lblKey!=null){setLabel(ds.lblKey,t.value);return;}
 if(ds.impLadder!=null){autoR(t);setImp(ds.d,ds.impLadder,{ladder:t.value});}
 else if(ds.candName!=null){autoR(t);setCandField(ds.candName,'name',t.value);}
 else if(ds.candNotes!=null){autoR(t);setCandField(ds.candNotes,'notes',t.value);}
 else if(ds.keeName!=null){autoR(t);setKeeField(ds.keeName,'name',t.value);}
 else if(ds.keeNotes!=null){autoR(t);setKeeField(ds.keeNotes,'notes',t.value);}
 else if(ds.keeGoal!=null){autoR(t);setKeeField(ds.keeGoal,'goal',t.value);}
 else if(ds.keeDaynote!=null){setKeeDayNote(ds.keeDaynote,t.value);}
 else if(ds.prinIf!=null){autoR(t);setPrinField(ds.prinIf,'ifText',t.value);}
 else if(ds.prinThen!=null){autoR(t);setPrinField(ds.prinThen,'thenText',t.value);}
 else if(ds.north!=null){autoR(t);if(typeof ST.north!=='string')ST.north='';ST.north=t.value;ST._northTs=Date.now();save();}
 else if(ds.gdcid!=null){try{if(t.value.trim())localStorage.setItem('gd_cid',t.value.trim());else localStorage.removeItem('gd_cid');}catch(e){}}
 else if(ds.gdcsec!=null){try{if(t.value.trim())localStorage.setItem('gd_csec',t.value.trim());else localStorage.removeItem('gd_csec');}catch(e){}}
 else if(ds.thrTitle!=null){autoR(t);setThreadField(ds.thrTitle,'title',t.value);}
 else if(ds.thrHyp!=null){autoR(t);setThreadField(ds.thrHyp,'hypothesis',t.value);}
 else if(ds.thrObs!=null){autoR(t);setThreadField(ds.thrObs,'obs',t.value);}
 else if(ds.sprDomain!=null){autoR(t);setSprintField(ds.sprDomain,'domain',t.value);}
 else if(ds.sprTrigger!=null){autoR(t);setSprintField(ds.sprTrigger,'trigger',t.value);}
 else if(ds.sprConcl!=null){autoR(t);setSprintField(ds.sprConcl,'conclusion',t.value);}
 else if(ds.sprDay!=null){autoR(t);setSprintDay(ds.sprId,ds.sprDay,t.value);}
});

load();if(migrateLinks())save();if(!ST.startDate)ST.startDate=ST.date;render();
(function(){var app=document.getElementById('app');if(!app)return;var sx=0,sy=0,st=0,on=false;
app.addEventListener('touchstart',function(e){on=false;if(ST.mode!=='day'||ST.ss)return;if(e.touches.length!==1)return;var t=e.target;if(t.closest&&t.closest('input,textarea,[contenteditable],button,.dprow,.calgrid,.nfields'))return;sx=e.touches[0].clientX;sy=e.touches[0].clientY;st=Date.now();on=true;},{passive:true});
app.addEventListener('touchend',function(e){if(!on)return;on=false;if(ST.mode!=='day'||ST.ss)return;var dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy,dt=Date.now()-st;if(dt>700)return;if(Math.abs(dx)<60||Math.abs(dx)<Math.abs(dy)*1.8)return;var nt=dx<0?1:0;if(nt!==_dayTab){_dayTab=nt;render();}},{passive:true});})();
