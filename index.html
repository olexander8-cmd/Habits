<script>
'use strict';
var DS=['\u041f\u043d','\u0412\u0442','\u0421\u0440','\u0427\u0442','\u041f\u0442','\u0421\u0431','\u0412\u0441'];
var toISO=function(d){return d.toISOString().split('T')[0];};
var today=function(){return toISO(new Date());};
function addD(s,n){var d=new Date(s);d.setDate(d.getDate()+n);return toISO(d);}
function addM(s,n){var d=new Date(s);d.setDate(1);d.setMonth(d.getMonth()+n);return toISO(d);}
function fmtDay(s){return new Date(s).toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'});}
function fmtWk(s){var m=getMon(s),su=addD(m,6),o={day:'numeric',month:'short'};return new Date(m).toLocaleDateString('ru-RU',o)+' \u2014 '+new Date(su).toLocaleDateString('ru-RU',o);}
function fmtMon(s){return new Date(s).toLocaleDateString('ru-RU',{month:'long',year:'numeric'});}
function fmtSh(s){return new Date(s).toLocaleDateString('ru-RU',{day:'numeric',month:'short',year:'numeric'});}
function getWK(s){var d=new Date(s);d.setHours(0,0,0,0);d.setDate(d.getDate()+3-(d.getDay()+6)%7);var y=d.getFullYear(),w=new Date(y,0,4);return y+'-W'+String(1+Math.round(((d-w)/86400000-3+(w.getDay()+6)%7)/7)).padStart(2,'0');}
function getMon(s){var d=new Date(s),day=d.getDay();d.setDate(d.getDate()-(day===0?6:day-1));return toISO(d);}
function monOfWK(wk){var m=wk.match(/^(\d+)-W(\d+)$/);if(!m)return today();var y=parseInt(m[1]),wn=parseInt(m[2]);var d=new Date(y,0,4);d.setDate(d.getDate()-((d.getDay()+6)%7));d.setDate(d.getDate()+(wn-1)*7);return toISO(d);}
function getDow(s){return (new Date(s).getDay()+6)%7;}
function dimth(s){var d=new Date(s);return new Date(d.getFullYear(),d.getMonth()+1,0).getDate();}
function fomth(s){var d=new Date(s);return toISO(new Date(d.getFullYear(),d.getMonth(),1));}
function mDates(s){var f=fomth(s),n=dimth(s),a=[];for(var i=0;i<n;i++)a.push(addD(f,i));return a;}
function mWeeks(s){var seen={},wks=[],dd=mDates(s);for(var i=0;i<dd.length;i++){var m=getMon(dd[i]);if(!seen[m]){seen[m]=1;wks.push(m);}}return wks;}
function parseH(v){if(!v)return 0;var s=String(v).trim();if(s.indexOf(':')>=0){var p=s.split(':');return parseInt(p[0])*60+(parseInt(p[1])||0);}return parseFloat(s)*60||0;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function noteObj(notes,dow){var r=(notes||{})[String(dow)];if(!r)return {ok:'',nok:''};if(typeof r==='string')return {ok:r,nok:''};return {ok:r.ok||'',nok:r.nok||''};}
function uniq(a,b){var s={};(a||[]).forEach(function(x){s[x]=1;});(b||[]).forEach(function(x){s[x]=1;});return Object.keys(s).map(Number);}
function fmtLines(text){if(!text||!text.trim())return '';return text.split('\n').map(function(l){var t=l.trim();if(!t)return '';return (t.slice(0,2)==='- ')?t:'- '+t;}).filter(Boolean).join('\n');}
function fmtLinesHtml(text){if(!text||!text.trim())return '';return text.split('\n').map(function(l){var t=l.trim();if(!t)return '';return esc((t.slice(0,2)==='- ')?t:'- '+t);}).filter(Boolean).join('<br>');}

var ST={mode:'day',date:today(),startDate:today(),daily:{},weekly:{},ss:false,descs:{}};
function C0(i){return {name:'\u041f\u0440\u0438\u0432\u044b\u0447\u043a\u0430 '+(i+1),desc:'',days:[],plan:[],notes:{}};}
var D0={sport:'',bike:false,hw:false,med:'',cold:''};

function updCard(f){var d=gD(),v=parseFloat(d[f])||0,tgt=f==='sport'?40:20,hv=d[f]!=='',g=v>=tgt;var ce=document.getElementById(f==='sport'?'cs':'cm');if(ce){ce.style.background=hv?(g?'rgba(34,197,94,.05)':'rgba(239,68,68,.05)'):'rgba(255,255,255,.025)';ce.style.borderColor=hv?(g?'rgba(34,197,94,.3)':'rgba(239,68,68,.2)'):'rgba(255,255,255,.07)';}var bf=document.querySelector('#'+(f==='sport'?'cs':'cm')+' .bar-f'),bw=document.getElementById('bw'+(f==='sport'?'s':'m'));if(bw)bw.style.display=hv?'block':'none';if(bf){bf.style.width=Math.min(100,v/tgt*100)+'%';bf.style.background=g?'#22c55e':'#ef4444';}var mv=document.getElementById('mv'+(f==='sport'?'s':'m'));if(mv)mv.style.color=hv?(g?'#22c55e':'#ef4444'):'rgba(255,255,255,.2)';}

// ── Google Drive sync ─────────────────────────────────────────────────────
var GD_ID='225293754921-gh897cgdf8neh4cko4149g0knsmahd6t.apps.googleusercontent.com';
var _gT=null,_gE=0,_gF=null,_gTC=null,_gST=null,_gStatus='offline',_gEmail=null;

function gSetStatus(s){_gStatus=s;var el=document.getElementById('sd');if(el)el.className='sync-dot '+s;}
function gSignedIn(){return _gT&&_gE>Date.now();}

function gInit(){
  if(typeof google==='undefined'||!google.accounts||!google.accounts.oauth2){setTimeout(gInit,300);return;}
  _gTC=google.accounts.oauth2.initTokenClient({
    client_id:GD_ID,
    scope:'https://www.googleapis.com/auth/drive.file',
    callback:function(resp){
      if(resp.access_token){
        _gT=resp.access_token;_gE=Date.now()+(resp.expires_in-60)*1000;
        try{localStorage.setItem('gd_t',JSON.stringify({t:_gT,e:_gE}));}catch(e){}
        gAfterSignIn();
      }
    },
    error_callback:function(err){console.error('Auth error:',err);gSetStatus('error');}
  });
  try{
    var saved=JSON.parse(localStorage.getItem('gd_t')||'null');
    if(saved&&saved.e>Date.now()){
      _gT=saved.t;_gE=saved.e;
      _gF=localStorage.getItem('gd_f')||null;
      _gEmail=localStorage.getItem('gd_em')||null;
      gSetStatus('syncing');
      gAfterSignIn();
    }
  }catch(e){}
}

function gSignIn(){if(!_gTC){alert('Google API ещё грузится, подожди пару секунд');return;}_gTC.requestAccessToken();}
function gSignOut(){_gT=null;_gE=0;_gF=null;_gEmail=null;try{localStorage.removeItem('gd_t');localStorage.removeItem('gd_f');localStorage.removeItem('gd_em');}catch(e){}gSetStatus('offline');if(document.getElementById('bov').classList.contains('h'))return;openSettings();}

function gAfterSignIn(){
  gSetStatus('syncing');
  gFindOrCreateFile().then(function(id){
    if(!id){gSetStatus('error');return;}
    _gF=id;try{localStorage.setItem('gd_f',id);}catch(e){}
    return gLoadFile().then(function(cloud){
      var cd=cloud&&cloud.dailyData?Object.keys(cloud.dailyData).length:0;
      var ld=Object.keys(ST.daily).length;
      if(cd>ld||(cd>0&&cloud._ts&&(!ST._ts||cloud._ts>ST._ts))){
        var m=migrate(cloud);ST.startDate=m.startDate;ST.daily=m.daily;ST.weekly=m.weekly;ST.descs=cloud.descs||{};
        try{localStorage.setItem('ht1',JSON.stringify({sd:ST.startDate,d:ST.daily,w:ST.weekly,descs:ST.descs||{}}));}catch(e){}
        render();
      } else if(ld>0){
        gSaveNow();return;
      }
      gSetStatus('synced');
    });
  }).catch(function(e){console.error(e);gSetStatus('error');});
  // Fetch email for display
  fetch('https://www.googleapis.com/oauth2/v2/userinfo',{headers:{Authorization:'Bearer '+_gT}}).then(function(r){return r.json();}).then(function(u){if(u&&u.email){_gEmail=u.email;try{localStorage.setItem('gd_em',u.email);}catch(e){}}}).catch(function(){});
}

function gFindOrCreateFile(){
  return fetch('https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent("name='habits-data.json' and trashed=false")+'&spaces=drive&fields=files(id,name)',{
    headers:{Authorization:'Bearer '+_gT}
  }).then(function(r){return r.json();}).then(function(data){
    if(data.files&&data.files.length>0)return data.files[0].id;
    return fetch('https://www.googleapis.com/drive/v3/files',{
      method:'POST',
      headers:{'Authorization':'Bearer '+_gT,'Content-Type':'application/json'},
      body:JSON.stringify({name:'habits-data.json',mimeType:'application/json'})
    }).then(function(r){return r.json();}).then(function(d){return d.id;});
  });
}

function gSaveNow(){
  if(!_gF||!_gT)return Promise.resolve();
  gSetStatus('syncing');
  var data={startDate:ST.startDate,dailyData:ST.daily,weeklyData:ST.weekly,descs:ST.descs||{},_ts:Date.now()};
  return fetch('https://www.googleapis.com/upload/drive/v3/files/'+_gF+'?uploadType=media',{
    method:'PATCH',
    headers:{'Authorization':'Bearer '+_gT,'Content-Type':'application/json'},
    body:JSON.stringify(data)
  }).then(function(r){if(r.ok){gSetStatus('synced');}else{gSetStatus('error');}}).catch(function(e){console.error(e);gSetStatus('error');});
}

function gLoadFile(){
  if(!_gF||!_gT)return Promise.resolve(null);
  return fetch('https://www.googleapis.com/drive/v3/files/'+_gF+'?alt=media',{
    headers:{Authorization:'Bearer '+_gT}
  }).then(function(r){if(!r.ok)return null;return r.json();}).catch(function(){return null;});
}

function gQueueSync(){
  if(!gSignedIn())return;
  clearTimeout(_gST);
  gSetStatus('syncing');
  _gST=setTimeout(gSaveNow,1500);
}

gInit();


load();if(!ST.startDate)ST.startDate=ST.date;render();
