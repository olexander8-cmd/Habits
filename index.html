var toISO=function(d){return d.toISOString().split('T')[0];};

function addD(s,n){var d=new Date(s);d.setDate(d.getDate()+n);return toISO(d);}

function fmtMon(s){return new Date(s).toLocaleDateString('ru-RU',{month:'long',year:'numeric'});}
function fmtSh(s){return new Date(s).toLocaleDateString('ru-RU',{day:'numeric',month:'short',year:'numeric'});}
function getWK(s){var d=new Date(s);d.setHours(0,0,0,0);d.setDate(d.getDate()+3-(d.getDay()+6)%7);var y=d.getFullYear(),w=new Date(y,0,4);return y+'-W'+String(1+Math.round(((d-w)/86400000-3+(w.getDay()+6)%7)/7)).padStart(2,'0');}
function getMon(s){var d=new Date(s),day=d.getDay();d.setDate(d.getDate()-(day===0?6:day-1));return toISO(d);}
function monOfWK(wk){var m=wk.match(/^(\d+)-W(\d+)$/);if(!m)return today();var y=parseInt(m[1]),wn=parseInt(m[2]);var d=new Date(y,0,4);d.setDate(d.getDate()-((d.getDay()+6)%7));d.setDate(d.getDate()+(wn-1)*7);return toISO(d);}
function getDow(s){return (new Date(s).getDay()+6)%7;}
function dimth(s){var d=new Date(s);return new Date(d.getFullYear(),d.getMonth()+1,0).getDate();}
function fomth(s){var d=new Date(s);return toISO(new Date(d.getFullYear(),d.getMonth(),1));}
function mDates(s){var f=fomth(s),n=dimth(s),a=[];for(var i=0;i<n;i++)a.push(addD(f,i));return a;}
function mWeeks(s){var seen={},wks=[],dd=mDates(s);for(var i=0;i<dd.length;i++){var m=getMon(dd[i]);if(!seen[m]){seen[m]=1;wks.push(m);}}return wks;}

function noteObj(notes,dow){var r=(notes||{})[String(dow)];if(!r)return {ok:'',nok:''};if(typeof r==='string')return {ok:r,nok:''};return {ok:r.ok||'',nok:r.nok||''};}
function uniq(a,b){var s={};(a||[]).forEach(function(x){s[x]=1;});(b||[]).forEach(function(x){s[x]=1;});return Object.keys(s).map(Number);}
function fmtLines(text){if(!text||!text.trim())return '';return text.split('\n').map(function(l){var t=l.trim();if(!t)return '';return (t.slice(0,2)==='- ')?t:'- '+t;}).filter(Boolean).join('\n');}

function C0name(i){return '\u041f\u0440\u0438\u0432\u044b\u0447\u043a\u0430 '+(i+1);}
function ensureHabitDefs(){
  if(!Array.isArray(ST.habitDefs))ST.habitDefs=[];
  for(var i=ST.habitDefs.length;i<10;i++)ST.habitDefs.push({name:C0name(i),desc:''});
  // Migrate once: if any habitDef is default but weekly has custom data, pull it in
  if(!ST._habitDefsMigrated){
    var keys=Object.keys(ST.weekly||{}).sort().reverse();
    for(var i=0;i<10;i++){
      for(var w=0;w<keys.length;w++){
        var h=(ST.weekly[keys[w]].habits||[])[i];
        if(!h)continue;
        if(ST.habitDefs[i].name===C0name(i)&&h.name&&h.name!==C0name(i))ST.habitDefs[i].name=h.name;
        if(!ST.habitDefs[i].desc&&h.desc)ST.habitDefs[i].desc=h.desc;
        if(ST.habitDefs[i].name!==C0name(i)&&ST.habitDefs[i].desc)break;
      }
    }
    ST._habitDefsMigrated=true;
    ST._habitDefsTs=Date.now();
  }
}

function gW(k){var raw=ST.weekly[k||getWK(ST.date)],b=W0();if(!raw)return b;var m=Object.assign({},b,raw);m.isoNotes=raw.isoNotes||{};m.isoPlan=raw.isoPlan||[];m.isoDays=raw.isoDays||[];m.nrNotes=raw.nrNotes||{};m.nrPlan=raw.nrPlan||[];m.nrDays=raw.nrDays||[];m.iNotes=raw.iNotes||{};m.iPlan=raw.iPlan||[];m.fNotes=raw.fNotes||{};m.fPlan=raw.fPlan||[];m.pNotes=raw.pNotes||{};m.pPlan=raw.pPlan||[];m.habits=raw.habits?raw.habits.map(function(h,i){return Object.assign({},C0(i),h);}):b.habits;return m;}

function cntB(dates,f){return dates.filter(function(d){return !!(ST.daily[d]||{})[f];}).length;}
function save(){try{localStorage.setItem('ht1',JSON.stringify({sd:ST.startDate,d:ST.daily,w:ST.weekly,descs:ST.descs||{},_descsTs:ST._descsTs||0,hd:ST.habitDefs||[],_hdTs:ST._habitDefsTs||0,_hdM:ST._habitDefsMigrated||false,cnd:ST.candidates||[],_cndTs:ST._candidatesTs||0,spr:ST.sprints||[],_sprTs:ST._sprintsTs||0,thr:ST.threads||[],_thrTs:ST._threadsTs||0,kee:ST.keepers||[],_keeTs:ST._keepersTs||0,prin:ST.principles||[],_prinTs:ST._principlesTs||0,north:ST.north||'',_northTs:ST._northTs||0,hh:ST.hideHabits?1:0,_hhTs:ST._hideHabitsTs||0,lbl:ST.labels||{},_lblTs:ST._labelsTs||0,del:ST.deleted||{}}));}catch(e){}if(typeof gQueueSync==='function')gQueueSync();}

function _wrapSelTag(tag){var sel=window.getSelection();if(!sel||!sel.rangeCount)return;var range=sel.getRangeAt(0);if(range.collapsed)return;var node=document.createElement(tag);try{node.appendChild(range.extractContents());}catch(e){return;}range.insertNode(node);range.setStartAfter(node);range.setEndAfter(node);range.collapse(true);sel.removeAllRanges();sel.addRange(range);}

function gSignIn(){

function _handleCallback(){
  var p=new URLSearchParams(location.search);
  var code=p.get('code'),err=p.get('error');
  if(err){console.error('OAuth err:',err);history.replaceState(null,'',location.pathname);return false;}
  if(!code)return false;
  var verifier=null;try{verifier=sessionStorage.getItem('gd_pv');}catch(e){}
  if(!verifier){history.replaceState(null,'',location.pathname);return false;}
  var body=new URLSearchParams({code:code,client_id:gdId(),client_secret:gdSecret(),redirect_uri:GD_REDIRECT,grant_type:'authorization_code',code_verifier:verifier});
  fetch('https://oauth2.googleapis.com/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body}).then(function(r){return r.json();}).then(function(d){
    console.log('OAuth callback response:',d);if(d.access_token){
      _gT=d.access_token;_gE=Date.now()+(d.expires_in-60)*1000;
      if(d.refresh_token){_gRT=d.refresh_token;try{localStorage.setItem('gd_rt',d.refresh_token);}catch(e){}}
      try{localStorage.setItem('gd_t',JSON.stringify({t:_gT,e:_gE}));localStorage.setItem('gd_auth','1');sessionStorage.removeItem('gd_pv');}catch(e){}
      history.replaceState(null,'',location.pathname);
      gAfterSignIn();
    } else {
      console.error('Token exchange failed:',d);alert('\u041e\u0448\u0438\u0431\u043a\u0430 \u043f\u043e\u0434\u043a\u043b\u044e\u0447\u0435\u043d\u0438\u044f: '+(d.error_description||d.error||'unknown'));
    }
  }).catch(function(e){console.error(e);});
  history.replaceState(null,'',location.pathname);
  return true;
}

function gRefresh(){
  if(!_gRT)return Promise.resolve(false);
  var body=new URLSearchParams({refresh_token:_gRT,client_id:gdId(),client_secret:gdSecret(),grant_type:'refresh_token'});
  return fetch('https://oauth2.googleapis.com/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body}).then(function(r){return r.json();}).then(function(d){
    console.log('OAuth callback response:',d);if(d.access_token){
      _gT=d.access_token;_gE=Date.now()+(d.expires_in-60)*1000;
      try{localStorage.setItem('gd_t',JSON.stringify({t:_gT,e:_gE}));}catch(e){}
      return true;
    }
    if(d.error==='invalid_grant'){_gRT=null;try{localStorage.removeItem('gd_rt');}catch(e){}}
    return false;
  }).catch(function(){return false;});
}

function _ensureToken(){
  if(_gT&&_gE>Date.now())return Promise.resolve(true);
  return gRefresh();
}

function gAfterSignIn(){
  gSetStatus('syncing');
  return _ensureToken().then(function(ok){
    if(!ok){gSetStatus('error');return;}
    fetch('https://www.googleapis.com/oauth2/v2/userinfo',{headers:{Authorization:'Bearer '+_gT}}).then(function(r){return r.json();}).then(function(u){if(u&&u.email){_gEmail=u.email;try{localStorage.setItem('gd_em',u.email);}catch(e){}}}).catch(function(){});
    return gFindOrCreateFile().then(function(id){
      if(!id){gSetStatus('error');return;}
      _gF=id;try{localStorage.setItem('gd_f',id);}catch(e){}
      return gLoadFile().then(function(cloud){
        if(cloud){
          var merged=mergeData(ST,cloud);
          if(applyMerged(merged))render();
        }
        // Push merged state back to cloud
        return gSaveNow();
      }).catch(function(e){console.error(e);gSetStatus('error');});
    }).catch(function(e){console.error(e);gSetStatus('error');});
  }).catch(function(e){console.error(e);gSetStatus('error');});
}

function gFindOrCreateFile(){
  return _ensureToken().then(function(ok){
    if(!ok)return null;
    return fetch('https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent("name='habits-data.json' and trashed=false")+'&spaces=drive&fields=files(id,name)',{headers:{Authorization:'Bearer '+_gT}}).then(function(r){
      if(r.status===401){_gE=0;return gRefresh().then(function(ok){return ok?gFindOrCreateFile():null;});}

        if(data.files&&data.files.length>0)return data.files[0].id;
        return fetch('https://www.googleapis.com/drive/v3/files',{method:'POST',headers:{'Authorization':'Bearer '+_gT,'Content-Type':'application/json'},body:JSON.stringify({name:'habits-data.json',mimeType:'application/json'})}).then(function(r){return r.json();}).then(function(d){return d.id||null;});
      });
    }).catch(function(){return null;});
  });

function gSaveNow(){
  if(!_gF)return Promise.resolve();

    gSetStatus('syncing');

      if(cloud){
        var merged=mergeData(ST,cloud);
        if(applyMerged(merged))render();
      }
      var data={deleted:ST.deleted||{},startDate:ST.startDate,dailyData:ST.daily,weeklyData:ST.weekly,descs:ST.descs||{},_descsTs:ST._descsTs||0,habitDefs:ST.habitDefs||[],_habitDefsTs:ST._habitDefsTs||0,_habitDefsMigrated:ST._habitDefsMigrated||false,labels:ST.labels||{},_labelsTs:ST._labelsTs||0,candidates:ST.candidates||[],_candidatesTs:ST._candidatesTs||0,sprints:ST.sprints||[],_sprintsTs:ST._sprintsTs||0,threads:ST.threads||[],_threadsTs:ST._threadsTs||0,keepers:ST.keepers||[],_keepersTs:ST._keepersTs||0,principles:ST.principles||[],_principlesTs:ST._principlesTs||0,north:ST.north||'',_northTs:ST._northTs||0,hideHabits:!!ST.hideHabits,_hideHabitsTs:ST._hideHabitsTs||0,_ts:Date.now()};

function gInit(){
  // Load saved tokens
  try{
    var saved=JSON.parse(localStorage.getItem('gd_t')||'null');
    if(saved){_gT=saved.t;_gE=saved.e;}
    _gRT=localStorage.getItem('gd_rt')||null;
    _gF=localStorage.getItem('gd_f')||null;
    _gEmail=localStorage.getItem('gd_em')||null;

  if(_handleCallback())return;
  // Auto-resume if we have refresh token
  if(_gRT){gAfterSignIn();}

function renderFaq(){var b=document.getElementById('faqBody');var h='';
 h+='<div class="faq-sec"><div class="faq-h">С чего начать</div><p>Метафора — сад: что полезно, растишь (посадки, опоры); вредные тяги выпалываешь (сорняки). Ежедневная работа идёт в <b>Логе импульсов</b>.</p><p><b>Петля одного импульса:</b></p><p>1. Заметил желание — занеси в лог («захотелось залипнуть в ленту»).<br>2. Оцени <b>«тянет»</b> 0–10 — насколько тянет <i>прямо сейчас</i> (напр. 8).<br>3. Позже оцени <b>«последствия»</b> 0–10 — как оказалось <i>по факту</i> (через час: пусто, время ушло — 2).<br>4. Повесь тег.</p><p><b>Зачем две оценки в разное время.</b> «Тянет» — обещание в моменте, «последствия» — правда потом. Разрыв между ними (8→2) и слабит привычку: мозг видит, что тяга обманула. Поэтому «последствия» ставь честно и позже, не в ту же секунду — лучше в фиксированное время, например вечером: сразу после акта оценку искажают послевкусие или вина.</p><p><b>Вердикт по «последствиям»:</b> <b style="color:#22c55e">≥6 — посадка +</b> (стоило, питай это); <b style="color:#ef4444">≤3 — сорняк 0/–</b> (тяга обманула); между — нейтрально.</p><p>Дальше тег решает, куда уйдёт импульс — см. «Три тега и их выход» ниже.</p></div>';
 h+='<div class="faq-sec"><div class="faq-h">Карта разделов</div><p><b>📝 Лог импульсов</b> (в «Дне») — главный экран: заносишь желания, оцениваешь, помечаешь.</p><p><b>🌊 Переждал</b> — счётчик «не покормил тягу». Жмёшь, когда потянуло и ты пережил, не поддавшись (захотелось сладкого → выпил воды → +1).</p><p><b>🥀 Потенциальные сорняки</b> — куда уходит тег «сорняк». Проверяешь тестами, что правда пусто, ставишь статус, и <b>переоцениваешь повторно</b> (новый случай) — со временем система покажет «переоцениваешь на N» — насколько тяга обманывает по ряду случаев. Повторяется с триггером → «→ правило».</p><p><b>⚓ Опоры</b> — нужное, подтверждённое ценным (тег «растим дальше» или прямой путь из маршрута). По умолчанию кнопка «⚓ повторил сегодня +1» считает, сколько раз ты сделал опору (видно «сегодня» и «за 7 дней»); случайный +1 убери кнопкой «−1» рядом. Можно включить режим цели — тогда отмечаешь получилось/нет по дням (напр. «утренняя прогулка»).</p><p><b>📜 Принципы (если→то)</b> — заранее заготовленный ответ на повторяющийся сорняк: «если открываю телефон в кровати → телефон на кухню». Создаётся из сорняка кнопкой «→ правило».</p><p><b>🧩 Откуда растёт</b> — для копания в подавленное и неясное. Когда задело сильнее повода, зависть, «не моё» — пишешь сигнал и гипотезу, ищешь настоящую нужду.</p><p><b>📆 Квартальные спринты</b> — фокус на одном домене (кофе / шопинг / избегание) на ~3 месяца, с выводом в конце.</p><p><b>🔍 Обзор что растёт</b> — еженедельная сверка: неделя к неделе (меньше сорняков? больше опор?), что недооценено, что в работе.</p><p><b>🧭 Ради чего всё</b> (вверху «Дня») — 3–5 ценностей или миссия, по которой судишь «полезно или сорняк». Компас всего.</p><p><b>Статус «в депривации»</b> (у сорняка) — «на паузе»: временно не даёшь себе это, чтобы проверить, насколько реально нужно.</p></div>';
 h+='<div class="faq-sec"><div class="faq-h">Сорняк или кривой маршрут — в чём разница</div><p>Сорняк — тяга, за которой пусто: последствия 0/–. Её обесценивают и пережидают. Кривой маршрут — другое: <b>цель настоящая, а дорога к ней кривая.</b> Покупка вещи (кривой путь) ради статуса или принятия (настоящая нужда). Тягу нельзя просто выполоть — задавишь и саму нужду.</p></div>';
 h+='<div class="faq-sec" id="faqTests"><div class="faq-h">Тесты сорняка (галочки в реестре)</div><p>Четыре галочки на карточке сорняка проверяют, правда ли это пустой сорняк, а не замаскированная нужда (кривой маршрут). Чем больше галочек — тем увереннее выпалывать, а не перенаправлять.</p><p><b>Остаётся ли что-то, когда тяга схлынула? (нет)</b> — переждав острое «хочу» (10–20 мин, не поддаваясь), проверь: осталась ли причина? У нужды — да; у сорняка с волной уходит и желание. Галочка = не осталось ничего.</p><p><b>Срабатывает реактивно, без задачи?</b> — тяга запускается сама от стимула (увидел телефон → схватил; скучно → лента), а не из намерения. Галочка = рефлекс на триггер, не осознанный выбор.</p><p><b>Дно «зачем→зачем» — пустота/петля?</b> — спускайся «зачем? → а это зачем?» до дна. У маршрута внизу живая нужда (близость, признание, безопасность); у сорняка — пустота («просто чтоб было») или петля («ем, потому что переел»). Галочка = настоящей нужды внизу нет.</p><p><b>«Последствия» стабильно низкие (0/–)?</b> — по накопленным случаям оценка «последствия» раз за разом низкая (это и есть «переоцениваешь на N» на карточке). Галочка = по ряду случаев стабильно 0 или минус.</p><p><b>Итог:</b> много галочек → чистый сорняк (обесценить, выполоть, при триггере → правило). Мало или нет, особенно если «зачем→зачем» нашло нужду → это <b>кривой маршрут</b>: не убирать, а найти прямой путь к нужде (→ опора).</p></div>';
 h+='<div class="faq-sec"><div class="faq-h">🥀 Что делать с сорняком</div><p>Обесценить, выполоть, переждать — не кормить тягу, дожить её (счётчик «переждал»). Что дальше — зависит от триггера.</p><p><b>Есть триггер</b> — конкретная узнаваемая зацепка, после которой тяга всплывает регулярно: время, место, эмоция, действие («открыл телефон в кровати», «после ужина», «когда тревожно»). Тогда подними в правило «если→то» (кнопка «→ правило» у сорняка): <i>если &lt;зацепка&gt; → &lt;заранее заготовленный ответ&gt;</i>. В следующий раз зацепка сработает — у тебя уже готова реакция.</p><p><b>Триггера нет — тяга диффузная:</b> размытая, без явной причины и объекта («просто хочется чего-нибудь», скука, общая маета). Повесить правило не на что. Тогда: пережди; поставь на депривацию; или копай в «откуда растёт».</p><p><b>Депривация</b> — намеренно не даёшь себе это какое-то время, чтобы проверить, насколько реально нужно (часто тяга гаснет — значит был автоматизм, а не нужда). Ставится в реестре: открой сорняк и нажми статус «в депривации».</p></div>';

м не является: планка комфорта просто уехала вверх, и без экрана/перекуса/фона «непривычно», а не «плохо».</p><p><b>Два формата.</b> <b>Точечная</b> — статус «в депривации» у конкретного сорняка: 2–4 недели не даёшь себе именно это. Держи 1–3 вещи разом, не больше — депривация ест внимание и волю. <b>Общий сброс</b> — день или выходные без всех входов (как ретрит, дома).</p><p><b>Что оставить (базовый минимум):</b> сон, вода, простая еда, тепло и кров, гигиена, движение (медленная ходьба), практика сидя.</p><p><b>Что исключить на период:</b> телефон/интернет/экраны, чтение, письмо, музыку и подкасты, ТВ, алкоголь, по желанию кофеин и мясо, разговоры и «дела по хозяйству».</p><p><b>Условия дома («келья»):</b> пустая комната или угол — нечем зацепить взгляд; телефон выключен и физически в другой комнате; тишина (беруши); место сидеть; вода рядом.</p><p><b>Чем занять — структура решает.</b> Ретрит работает не пустотой, а расписанием: время заполнено практикой, иначе сорвёшься в телефон. Простой день: ранний подъём → блоки сидя 30–45 мин чередуй с медленной ходьбой → лёгкая еда по времени → отдых → ранний сон.</p><p><b>Ступени:</b> 1) цифровой шаббат — один день в неделю без экранов; 2) вечерняя «келья» 2–3 часа; 3) сольный день дома по правилам выше; 4) выходные (2 дня); 5) настоящий 10-дневный курс випассаны (бесплатно, на пожертвования) — глубокую версию лучше там: со структурой и наставниками.</p><p><b>Как часто:</b> шаббат — еженедельно; день-двое — раз в квартал; точечная депривация сорняка — 2–4 недели.</p><p><b>Как понимать результат.</b> Каждую снятую категорию веди как эксперимент: до — «тянет» (насколько кажется незаменимым), после — «последствия» (как было на деле). Тяга угасла и ничего не просело → был автоматизм, вычёркивай смело. Просело реально (сон, движение, контакт со временем) → настоящая нужда: возвращай, но осознанно и в свою меру, а не на автомате.</p><p><b>Оговорки.</b> Цель — ясность, не страдание: это временный сброс для перекалибровки, не пожизненный отказ. Долгая интенсивная тишина в одиночку может поднять тяжёлый материал — если внутри штормит, сокращай формат или иди на курс с наставниками.</p></div>';
 h+='<div class="faq-sec"><div class="faq-h">🔀 Что делать с кривым маршрутом</div><p><b>Не убрать, а перенаправить.</b></p><p><b>1. Докопаться до настоящей цели</b> — лестницей «зачем→зачем». Внизу почти всегда живая нужда: близость, признание, безопасность, смысл. У сорняка дно — пустота, у маршрута дно — настоящая потребность.</p><p><b>2. Назвать прямой путь к той же цели.</b> Кривой: «купить, чтобы почувствовать, что чего-то стою». Прямой: «сделать работу, которой горжусь» / «позвонить тому, кто важен». Прямой путь дороже усилием и медленнее наградой — потому и проигрывает быстрому суррогату.</p><p><b>3. Перевести прямой путь в опору.</b> Найденный прямой маршрут — уже не лишнее, а нужное. Кнопка «→ прямой путь»: называешь настоящую цель и прямой путь, он становится опорой (можно вести по дням). Маршрут не удаляется в никуда — конвертируется в опору.</p></div>';
 h+='<div class="faq-sec"><div class="faq-h">🧭 Истинные нужды — к чему копать</div><p>Настоящую нужду не вспоминают, её вычисляют. Если опыта нет или нужда задавлена — прямого доступа нет, её выводят с нескольких сторон (пробы ниже). Главное различение: <b>нужда универсальна и ни к чему конкретному не привязана; стратегия — конкретный способ её закрыть.</b> «Купить вещь», «чтобы он похвалил» — стратегии. «Чувствовать, что я значим» — нужда. Можешь назвать только через предмет или человека — копай ещё.</p><p>Слова-аналоги помогают быстрее опознать нужду:</p><p><b>Связь:</b> близость / принадлежность / «свои»; признание / быть увиденным / внимание / значимость; принятие / одобрение. <i>Маски: переедание, залипание, понты, спор ради правоты.</i></p><p><b>Безопасность и порядок:</b> безопасность / защищённость / покой; порядок / контроль / предсказуемость / структура; опора / стабильность / запас. <i>Маски: накопительство, тревожная занятость, перфекционизм.</i></p><p><b>Сила · статус · победа:</b> власть / влияние / воля / лидерство; статус / превосходство / престиж / ранг / быть выше; победа / конкуренция / взять верх / не проиграть; доминирование / авторитет. <i>Чаще всего — маска (см. ниже).</i></p><p><b>Я и автономия:</b> автономия / свобода / сам решаю; компетентность / мастерство / эффективность; достоинство / самоценность / «я ок сам по себе». <i>Маски: бунт назло, страх провала, трудоголизм.</i></p><p><b>Познание и рост:</b> любопытство / понять / знание; новизна / интерес / стимуляция; рост / становление. <i>Маски: бесконечное потребление инфо.</i></p><p><b>Смысл и принципы:</b> смысл / вклад / служить большему / след; принципы / честь / целостность / держать слово; справедливость / правда. <i>Маски: спасательство.</i></p><p><b>Тело и витальность:</b> сон, еда, движение, прикосновение; влечение / секс / красота; отдых / восстановление; игра / радость / лёгкость. <i>Маски: «отдых» через ленту и еду.</i></p></div>';
 h+='<div class="faq-sec"><div class="faq-h">Сила, статус, победа — чаще всего маска</div><p>Этот кластер реальный (его подтверждают Reiss и Питерсон), но он — самый частый «второй слой» над другой нуждой. Докопавшись до «быть выше / выиграть / власть», сделай ещё шаг и различи:</p><p><b>Терминальная</b> форма (нужда сама по себе): люблю саму игру, мастерство, вести за собой, строить → ближе к <b>компетентности / вкладу</b>.</p><p><b>Инструментальная</b> (стратегия под другой нуждой): «должен быть сверху» → под этим обычно <b>безопасность</b> (чтоб не подмяли), <b>признание / принадлежность</b> (чтоб ценили) или <b>самоценность</b> (доказать, что чего-то стою).</p><p><b>Проба:</b> «если бы меня и так уважали и я был в безопасности — мне всё ещё нужно было бы их обойти?» Гаснет → была маска. Остаётся → терминальная (тогда прямой путь — компетентность, которую ценят, а не власть над людьми).</p></div>';
 h+='<div class="faq-sec"><div class="faq-h">Как докопаться, когда не знаешь</div><p>Две-три пробы сходятся → нашёл.</p><p><b>1. Что почувствую, если получу?</b> Представь, что цель уже твоя. Облегчение → безопасность. Тепло → близость. «Наконец я ок» → самоценность.</p><p><b>2. Чего боюсь, если НЕ получу?</b> Страх отвечает прямее желания. Остаться один → близость. Оказаться никчёмным → самоценность. Потерять контроль → безопасность/автономия. <i>Бояться проигрыша вместо гордиться победой — внизу не мастерство, а безопасность.</i></p><p><b>3. Тело.</b> Сжатие/защита → угроза/безопасность; пустота в груди → связь или смысл; непоседливость → новизна или свобода; тяжесть → отдых.</p><p><b>4. Проба насыщением.</b> Это «последствия» в логе. Повторяешь стратегию, а последствия раз за разом 0/– — бьёшь не в ту нужду. Низкий разрыв по ряду случаев = мимо.</p><p><b>5. Чей это голос?</b> «Если бы никто не узнал — я бы всё ещё этого хотел?» Гаснет без зрителя → выученная цель-перформанс, не нужда.</p></div>';
 h+='<div class="faq-sec"><div class="faq-h">Задавленные нужды · зависть-компас</div><p>К некоторым нуждам нет прямого доступа — их в детстве стыдили, и они ушли в тень. Признаки: презрение к этой нужде в других («нуждаться = слабость» часто = своя задавленная близость), и <b>зависть/раздражение</b>, когда кто-то свободно ею пользуется. Зависть — компас: показывает нужду, от которой ты отрёкся. Это сигналы раздела «Откуда растёт» (зависть, задело сильнее повода) — вход к подавленному.</p></div>';
 h+='<div class="faq-sec"><div class="faq-h">Три тега и их выход</div><p><b style="color:#ef4444">сорняк</b> (пусто) → реестр → обесценить / переждать; при чётком триггере → правило.</p><p><b style="color:#f59e0b">кривой маршрут</b> (цель есть, путь кривой) → лестница до нужды → прямой путь → в опоры.</p><p><b style="color:#22c55e">растим дальше</b> (своё) → сразу в опоры.</p></div>';
 b.innerHTML=h;}

(function(){var app=document.getElementById('app');if(!app)return;var sx=0,sy=0,st=0,on=false;
app.addEventListener('touchstart',function(e){on=false;if(ST.mode!=='day'||ST.ss)return;if(e.touches.length!==1)return;var t=e.target;if(t.closest&&t.closest('input,textarea,[contenteditable],button,.dprow,.calgrid,.nfields'))return;sx=e.touches[0].clientX;sy=e.touches[0].clientY;st=Date.now();on=true;},{passive:true});
app.addEventListener('touchend',function(e){if(!on)return;on=false;if(ST.mode!=='day'||ST.ss)return;var dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy,dt=Date.now()-st;if(dt>700)return;if(Math.abs(dx)<60||Math.abs(dx)<Math.abs(dy)*1.8)return;var nt=dx<0?1:0;if(nt!==_dayTab){_dayTab=nt;render();}},{passive:true});})();
</script>
